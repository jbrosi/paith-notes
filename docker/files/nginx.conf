worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    etag            on;
    keepalive_timeout  65;

    client_max_body_size 256m;

    server {
        listen 8080;

        # Store everything under /data
        # Requests are expected to be /files/<path>
        location ~ ^/files/(.+)\.[^/]+$ {
            alias /data/$1;

            auth_request /_auth;
            auth_request_set $notes_disposition $upstream_http_x_notes_content_disposition;
            auth_request_set $notes_type $upstream_http_x_notes_content_type;

            if ($notes_disposition != "") {
                add_header Content-Disposition "$notes_disposition" always;
            }

            if ($notes_type != "") {
                add_header Content-Type "$notes_type" always;
            }

            add_header X-Content-Type-Options "nosniff" always;

            dav_methods PUT DELETE;
            create_full_put_path on;
            dav_access user:rw group:rw all:r;

            add_header Cache-Control "no-store" always;
        }

        location /files/ {
            alias /data/;

            # Authorize + fetch response headers from the API without proxying file bytes
            auth_request /_auth;
            auth_request_set $notes_disposition $upstream_http_x_notes_content_disposition;
            auth_request_set $notes_type $upstream_http_x_notes_content_type;

            default_type "";

            add_header Content-Disposition "$notes_disposition" always;
            add_header Content-Type "$notes_type" always;

            add_header X-Content-Type-Options "nosniff" always;

            # Allow direct upload via PUT without buffering through PHP
            dav_methods PUT DELETE;
            create_full_put_path on;
            dav_access user:rw group:rw all:r;

            # Avoid caching in dev
            add_header Cache-Control "no-store" always;
        }

        location = /_auth {
            internal;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;

            proxy_pass http://app:8000/api/files/auth;
        }
    }
}
