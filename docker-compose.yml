services:
  claude:
    build:
      context: .
      dockerfile: docker/claude/Dockerfile
    profiles: ["claude"]
    stdin_open: true
    tty: true
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATABASE_URL: "postgresql://paith:paith@db:5432/paith"
      HOME: /home/ubuntu
    depends_on:
      - db
      - frontend
      - app
    volumes:
      - .:/workspace
      # Claude Code stores settings/memory/sessions under $HOME/.claude/ and
      # $HOME/.claude.json. HOME is /home/ubuntu (set above), so the volume
      # must mount there — mounting at /root preserved the wrong directory
      # and every rebuild wiped real state.
      - claude_state:/home/ubuntu
    working_dir: /workspace

  mcp:
    image: ${MCP_IMAGE:-notes-mcp}
    build:
      context: ./app/mcp
      target: dev
    volumes:
      - ./app/mcp/src:/app/src
    ports:
      - "3001:3000"
    env_file:
      - path: ~/.config/paith/mcp.env
        required: false
    environment:
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      API_BASE_URL: http://app:8000
      MCP_SERVER_URL: ${MCP_SERVER_URL:-https://mcp.paith.example.com}
      # VOICE_PROVIDER=openai routes TTS to OpenAI's /v1/audio/speech
      # (instructable per-sentence delivery; drops the local voice
      # container entirely). Leave unset to keep the local Kokoro path.
      VOICE_PROVIDER: ${VOICE_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-nova}
      # Optional external tools registered into the LLM toolset only
      # when enabled. Disabled (0/unset) tools contribute zero bytes to
      # the system prompt. See app/mcp/src/tools/ for module sources.
      WEATHER_TOOL_ENABLED: ${WEATHER_TOOL_ENABLED:-0}
      WIKIPEDIA_TOOL_ENABLED: ${WIKIPEDIA_TOOL_ENABLED:-0}
      # image-gen self-gates on OPENAI_API_KEY presence (no separate flag).
    depends_on:
      - app
    restart: unless-stopped

  app:
    image: ${APP_IMAGE:-notes-app}
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: dev
    environment:
      # Bind HTTP only on port 8000 (no HTTPS, no domain)
      SERVER_NAME: ":8000"
      FRANKENPHP_WATCH: "1"
      DATABASE_URL: "postgresql://paith:paith@db:5432/paith"
      KEYCLOAK_ENABLED: ${KEYCLOAK_ENABLED:-0}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      FILES_SIGNING_KEY: ${FILES_SIGNING_KEY:-}
      DEBUG_AUTH: ${DEBUG_AUTH:-0}
      # AI image generation — unset => factory falls back to a stub
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-}
      IMAGE_MODEL: ${IMAGE_MODEL:-}
      # /api/me reports features.voice = true when VOICE_ENABLED=1. The
      # voice container is required for STT regardless of TTS path — mic
      # audio is always proxied to voice:8000/stt by Caddy, never OpenAI.
      # VOICE_PROVIDER only switches the TTS leg (local kokoro vs OpenAI).
      VOICE_ENABLED: ${VOICE_ENABLED:-0}
      VOICE_PROVIDER: ${VOICE_PROVIDER:-local}
    depends_on:
      - frontend
      - db
      - files
    volumes:
      - ./app:/app
      - ./Caddyfile:/etc/frankenphp/Caddyfile:ro
      - files_data:/data
    ports:
      - "8000:8000"

  frontend:
    image: docker.io/node:24
    working_dir: /app/frontend
    command: sh -lc "export COREPACK_ENABLE_DOWNLOAD_PROMPT=0 && corepack enable && HASH_FILE=node_modules/.yarn.lock.sha256 && LOCK_HASH=$$(sha256sum yarn.lock | awk '{print $$1}') && if [ ! -d node_modules ] || [ -z \"$$(ls -A node_modules 2>/dev/null || true)\" ] || [ ! -f \"$$HASH_FILE\" ] || [ \"$$(cat \"$$HASH_FILE\" 2>/dev/null || true)\" != \"$$LOCK_HASH\" ]; then yarn install; mkdir -p node_modules; echo \"$$LOCK_HASH\" > \"$$HASH_FILE\"; fi && yarn run dev"
    environment:
      YARN_CACHE_FOLDER: "/tmp/yarn-cache"
      VITE_KEYCLOAK_URL: ${KEYCLOAK_BASE_URL:-}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      # Wake-word sidecar URL (KIOSK ONLY). Empty disables — voice mode
      # stays push-to-talk. Set to ws://localhost:8889/listen when the
      # `wake` profile is up (`COMPOSE_PROFILES=wake docker compose up`).
      VITE_WAKE_WORD_URL: ${WAKE_WORD_URL:-}
      # Display string for the kiosk's "Say <X> to start" prompt.
      VITE_WAKE_WORD_LABEL: ${WAKE_WORD_LABEL:-Alexa}
      MCP_URL: http://mcp:3000
    volumes:
      - ./app/frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - ./.ci-cache/yarn:/tmp/yarn-cache
    expose:
      - "5173"

  events:
    image: ${EVENTS_IMAGE:-notes-events}
    build:
      context: ./app/events
      target: dev
    volumes:
      - ./app/events/src:/app/src
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: "postgresql://paith:paith@db:5432/paith"
      SESSION_SECRET: ${SESSION_SECRET:-}
      KEYCLOAK_ENABLED: ${KEYCLOAK_ENABLED:-0}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      EVENTS_PORT: 3002
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:-notes-worker}
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
      target: dev
    command: ["php", "/app/worker/worker.php"]
    environment:
      DATABASE_URL: "postgresql://paith:paith@db:5432/paith"
      SESSION_SECRET: ${SESSION_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      files:
        condition: service_started
    volumes:
      - ./app:/app
      - files_data:/data

  db:
    image: docker.io/postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: paith
      POSTGRES_USER: paith
      POSTGRES_PASSWORD: paith
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  files:
    build: ./docker/files
    environment:
      FILES_SIGNING_KEY: ${FILES_SIGNING_KEY:-}
    volumes:
      # Mounted for fast iteration in dev; the Dockerfile bakes in the originals.
      - ./docker/files/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/files/njs:/etc/nginx/njs:ro
      - files_data:/data:U
    expose:
      - "8080"

  voice:
    image: ${VOICE_IMAGE:-notes-voice}
    build:
      context: ./app/voice
      target: dev
    volumes:
      - ./app/voice/src:/app/src
      # Persist downloaded whisper models across container restarts so the
      # ~150MB base model isn't refetched every rebuild. HF_HOME points here.
      - voice_models:/app/models/whisper
    expose:
      - "8000"
    environment:
      # Model defaults: small/int8 on CPU is fine for testing. For real use
      # bump to large-v3 + GPU (see GPU block below). large-v3 captures
      # non-verbal cues (laughs, sighs, pauses) far more reliably than base.
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
      # Comma-separated languages the server constrains autodetect to when
      # the request doesn't pin one. Default "en,de" — restrict to your
      # actual spoken languages so Whisper can't misfire to e.g. Arabic on
      # short clips. Empty disables the constraint (full 99-lang autodetect).
      WHISPER_LANGUAGE_CANDIDATES: ${WHISPER_LANGUAGE_CANDIDATES:-en,de}
      # Optional `initial_prompt` for faster-whisper — seeds the model so it
      # actually emits the non-verbal markers it occasionally captures.
      # Override (or set empty) to disable.
      WHISPER_INITIAL_PROMPT: ${WHISPER_INITIAL_PROMPT:-}
    # GPU passthrough — uncomment once nvidia-container-toolkit is set up in
    # the host VM. RTX 2070 (8GB) runs large-v3 at float16 comfortably,
    # ~150–300ms per typical utterance vs 1–3s on CPU. With OpenAI handling
    # TTS, Whisper is the only thing in this container that benefits from GPU.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  # Optional wake-word sidecar for hands-free kiosk testing. The browser
  # opens a WebSocket and streams mic audio; on wake fire, the browser
  # switches to the regular VAD-endpointed recording. Bind to 127.0.0.1
  # so the always-on mic stream stays on this device — never reachable
  # from the local network. Disable by default in dev (set profile to
  # opt in: `COMPOSE_PROFILES=wake docker compose up`).
  wake:
    image: ${WAKE_IMAGE:-notes-wake}
    profiles: ["wake"]
    build:
      context: ./app/wake
      target: dev
    volumes:
      - ./app/wake/src:/app/src
    ports:
      # Host-only binding: only processes on this machine (the kiosk's
      # browser) can talk to the wake socket. Don't expose on 0.0.0.0.
      - "127.0.0.1:8889:8889"
    environment:
      # Pick from openWakeWord's bundled set: alexa, hey_jarvis,
      # hey_mycroft, hey_rhasspy, weather, timer. Comma-separated for
      # multiple. Custom .onnx models can be referenced by absolute path.
      OPENWAKEWORD_MODELS: ${WAKE_WORD_MODEL:-alexa}
      # Tune for your room: 0.5 default; 0.6-0.7 for noisier rooms;
      # 0.4-0.45 if wakes are getting missed.
      WAKE_THRESHOLD: ${WAKE_THRESHOLD:-0.5}
    restart: unless-stopped

volumes:
  frontend_node_modules:
  files_data:
  claude_state:
  voice_models:
