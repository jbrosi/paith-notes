# Merged prod docker-compose.yml — takes your current /opt/docker/config/paith-notes/
# base and swaps in the new `files` service command that writes /etc/nginx/resolver.conf
# before nginx boots. The rest is unchanged from your prod version.
#
# Deploy checklist:
#   1. Copy this file to /opt/docker/config/paith-notes/docker-compose.yml on prod
#   2. Make sure the matching nginx.conf (with `include /etc/nginx/resolver.conf;`)
#      is deployed alongside it in the same directory
#   3. docker compose up -d --force-recreate files
#   4. Confirm the container log shows: `[paith files] resolver: <ip>`
services:
  # Optional: self-contained Postgres (uncomment to run DB locally on the host)
  # db:
  #   image: docker.io/postgres:17-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: paith
  #     POSTGRES_USER: paith
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - db_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 20

  app:
    image: ${APP_IMAGE:-ghcr.io/jbrosi/paith-notes/app:latest}
    restart: unless-stopped
    environment:
      SERVER_NAME: "notes.jb.paith.me:8000"
      # For external Postgres: set DATABASE_URL in .env
      # For the optional local DB above:
      # DATABASE_URL: postgresql://paith:${POSTGRES_PASSWORD}@db:5432/paith
      DATABASE_URL: ${DATABASE_URL}
      KEYCLOAK_ENABLED: ${KEYCLOAK_ENABLED:-0}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET}
      FILES_SIGNING_KEY: ${FILES_SIGNING_KEY}
      DEBUG_AUTH: ${DEBUG_AUTH:-0}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      # AI image generation — leave unset to disable (factory stubs out)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-}
      IMAGE_MODEL: ${IMAGE_MODEL:-}
      # Set to 1 only when a `voice` service is deployed. Drives the UI gate
      # via /api/me — when 0/unset the chat hides the mic + voice-mode toggle.
      VOICE_ENABLED: ${VOICE_ENABLED:-0}
    depends_on:
      - files
    volumes:
      - /dockerapps/paith-notes/data:/data
      - /dockerapps/paith-notes/certs:/certs:ro
    ports:
      - "10.42.0.100:8003:8000"

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/jbrosi/paith-notes/worker:latest}
    restart: unless-stopped
    command: ["php", "/app/worker/worker.php"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - files
    volumes:
      - /dockerapps/paith-notes/data:/data
      - /dockerapps/paith-notes/certs:/certs:ro


  # Optional: MCP server for AI integrations
  mcp:
    image: ${MCP_IMAGE:-ghcr.io/OWNER/REPO/mcp:latest}
    restart: unless-stopped
    environment:
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      API_BASE_URL: http://app:8000
      MCP_SERVER_URL: ${MCP_SERVER_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - app



  events:
    image: ${EVENTS_IMAGE:-ghcr.io/jbrosi/paith-notes/events:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      KEYCLOAK_ENABLED: ${KEYCLOAK_ENABLED:-0}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      EVENTS_PORT: 3002
    volumes:
      - /dockerapps/paith-notes/certs:/certs:ro
    expose:
      - "3002"


  files:
    image: docker.io/nginx:1.29-alpine
    restart: unless-stopped
    # Bare-image deploy avoids needing a custom build pipeline on the prod
    # host. We install njs (with the qjs engine) on first boot, hard-fail
    # on missing FILES_SIGNING_KEY, render the runtime DNS resolver from
    # /etc/resolv.conf (Docker has 127.0.0.11; podman+netavark uses the
    # network gateway — hardcoding either breaks the other), and only then
    # exec nginx.
    command:
      - "sh"
      - "-lc"
      - |
        : "${FILES_SIGNING_KEY:?FILES_SIGNING_KEY must be set; generate with: openssl rand -hex 32}"
        apk add --no-cache nginx-module-njs
        mkdir -p /data/tmp /data/notes
        chown -R nginx:nginx /data
        ns=$$(awk '/^nameserver/ && $$2 !~ /:/{print $$2}' /etc/resolv.conf | tr '\n' ' ')
        if [ -z "$$ns" ]; then echo "[paith files] FATAL: no IPv4 nameserver in /etc/resolv.conf" >&2; exit 1; fi
        printf 'resolver %s valid=10s ipv6=off;\nresolver_timeout 5s;\n' "$$ns" > /etc/nginx/resolver.conf
        echo "[paith files] resolver: $$ns"
        exec nginx -g 'daemon off;'
    environment:
      FILES_SIGNING_KEY: ${FILES_SIGNING_KEY}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./njs:/etc/nginx/njs:ro
      - /dockerapps/paith-notes/data:/data
