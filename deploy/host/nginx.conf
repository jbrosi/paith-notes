# Files container — WebDAV upload + forward-auth + HMAC-signed download.
#
# - Browser ↔ nginx writes upload bytes directly via `dav_methods PUT` (no PHP).
# - Downloads dispatch in qjs (docker/files/njs/files-auth.mjs):
#     * HMAC-signed URL → verify in-process, internal redirect to /_files_serve
#       (range requests reuse the same signature with no PHP roundtrip).
#     * Unsigned URL → existing forward_auth flow into PHP for the DB-backed
#       lookup (used by inline embeds in rendered markdown).

load_module modules/ngx_http_js_module.so;

# Exposed to qjs as process.env.FILES_SIGNING_KEY.
env FILES_SIGNING_KEY;

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    etag            on;
    keepalive_timeout  65;

    client_max_body_size 256m;

    # PUT bodies must hit disk before js_content runs, otherwise the post-
    # internalRedirect DAV handler sees a memory-buffered body and 500s with
    # "PUT request body must be in a file". Hoisted to server level so the
    # body-handling decision is locked in before the qjs dispatcher runs.
    # `clean` removes the temp file on failure; on success the DAV writer
    # renames it to the destination before cleanup fires.
    client_body_in_file_only clean;
    client_body_temp_path    /data/tmp;

    js_path    "/etc/nginx/njs/";
    js_engine  qjs;
    js_import  filesAuth from files-auth.mjs;

    server {
        listen 8080;

        # Public entrance — qjs decides which internal location handles it.
        location /files/ {
            js_content filesAuth.dispatch;
        }

        # Signed-URL fast path. qjs has verified the HMAC and set Content-Type
        # / Content-Disposition / Cache-Control headers from the (HMAC-trusted)
        # query params. No auth here — that would defeat the whole purpose.
        # Cache-Control is left to qjs (private, max-age=<remaining sig ttl>)
        # so browsers can cache + revalidate within the URL's validity window.
        location /_files_serve/ {
            internal;
            alias /data/;
            default_type "";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Unsigned GET fallback — same forward-auth contract paith has always
        # had. PHP returns X-Notes-Content-* headers via auth_request_set.
        location /_files_get_with_auth/ {
            internal;
            alias /data/;

            auth_request /_auth;
            auth_request_set $notes_disposition $upstream_http_x_notes_content_disposition;
            auth_request_set $notes_type        $upstream_http_x_notes_content_type;

            default_type "";
            add_header Content-Disposition "$notes_disposition" always;
            add_header Content-Type        "$notes_type"        always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "no-store" always;
        }

        # PUT / DELETE go through PHP's claim-this-temp-upload check, then
        # nginx's DAV module writes the bytes straight to /data.
        location /_files_dav_with_auth/ {
            internal;
            alias /data/;

            auth_request /_auth;

            dav_methods PUT;
            create_full_put_path on;
            dav_access user:rw group:rw all:r;
        }

        # PHP forward-auth callback. $request_uri stays at the client's original
        # /files/<key>?… URI even after qjs internalRedirect, so the PHP side
        # keeps working unchanged — it sees what the client sent.
        location = /_auth {
            internal;

            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";

            proxy_set_header X-Original-URI    $request_uri;
            proxy_set_header X-Original-Method $request_method;

            proxy_pass http://app:8000/api/files/auth;
        }
    }
}
