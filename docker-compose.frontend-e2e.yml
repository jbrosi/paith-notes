services:
  app:
    image: ${APP_IMAGE:-notes-app}
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: dev
    environment:
      SERVER_NAME: ":8000"
      FRANKENPHP_WATCH: "1"
      DATABASE_URL: "postgresql://paith:paith@db:5432/paith"
      KEYCLOAK_ENABLED: "0"
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      DEBUG_AUTH: ${DEBUG_AUTH:-0}
      # Same fixed key on both app and files so PHP-signed URLs verify in qjs.
      SESSION_SECRET: e2e-test-session-secret-not-for-production-use-32c
      FILES_SIGNING_KEY: e2e-test-files-signing-key-not-for-production-use
    depends_on:
      - frontend
      - db
      - files
    volumes:
      - ./app:/app
      - ./Caddyfile:/etc/frankenphp/Caddyfile:ro

  frontend:
    image: docker.io/node:24
    working_dir: /app/frontend
    command: sh -lc "export COREPACK_ENABLE_DOWNLOAD_PROMPT=0 && corepack enable && if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null || true)\" ]; then yarn install; fi && yarn run dev"
    environment:
      YARN_CACHE_FOLDER: "/tmp/yarn-cache"
      VITE_KEYCLOAK_URL: ${KEYCLOAK_BASE_URL:-}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
    volumes:
      - ./app/frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - ./.ci-cache/yarn:/tmp/yarn-cache
    expose:
      - "5173"

  worker:
    image: ${WORKER_IMAGE:-notes-worker}
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
      target: dev
    command: ["php", "/app/worker/worker.php"]
    environment:
      DATABASE_URL: "postgresql://paith:paith@db:5432/paith"
      SESSION_SECRET: e2e-test-session-secret-not-for-production-use-32c
      FILES_SIGNING_KEY: e2e-test-files-signing-key-not-for-production-use
    depends_on:
      db:
        condition: service_healthy
      files:
        condition: service_started
    volumes:
      - ./app:/app

  db:
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_DB: paith
      POSTGRES_USER: paith
      POSTGRES_PASSWORD: paith
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  files:
    build: ./docker/files
    environment:
      FILES_SIGNING_KEY: e2e-test-files-signing-key-not-for-production-use
    volumes:
      - files_data:/data
    expose:
      - "8080"

volumes:
  frontend_node_modules:
  files_data:
