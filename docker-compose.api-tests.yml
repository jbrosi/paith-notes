services:
  worker:
    image: ${WORKER_IMAGE:-notes-worker}
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
      target: dev
    environment:
      DATABASE_URL: "postgresql://paith:paith@db:5432/paith"
    depends_on:
      db:
        condition: service_healthy
      files:
        condition: service_started
    volumes:
      - ./app:/app

  db:
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_DB: paith
      POSTGRES_USER: paith
      POSTGRES_PASSWORD: paith
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10


  files:
    image: docker.io/nginx:1.29-alpine
    volumes:
      - ./docker/files/nginx.conf:/etc/nginx/nginx.conf:ro
      - files_data:/data
    expose:
      - "8080"

volumes:
  files_data:
