services:
  worker:
    image: ${WORKER_IMAGE:-notes-worker}
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
      target: dev
    environment:
      DATABASE_URL: "postgresql://paith:paith@db:5432/paith"
      S3_ENDPOINT: "http://rustfs:9000"
      S3_PUBLIC_ENDPOINT: "http://localhost:8000"
      S3_ACCESS_KEY: "rustfsadmin"
      S3_SECRET_KEY: "rustfsadmin"
      S3_BUCKET: "paith"
      S3_FILES_BUCKET: "files"
    depends_on:
      db:
        condition: service_healthy
      rustfs:
        condition: service_started
    volumes:
      - ./app:/app

  db:
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_DB: paith
      POSTGRES_USER: paith
      POSTGRES_PASSWORD: paith
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: docker.io/rustfs/rustfs:latest
    command: ["/data"]
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: "rustfsadmin"
      RUSTFS_SECRET_KEY: "rustfsadmin"
